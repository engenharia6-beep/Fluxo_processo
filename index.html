<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Fluxo Produtivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="app.css"/>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="tela-login" class="tela ativa">
  <div class="login-bg"><div class="login-grid"></div></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">⚙</div>
      <h1>Fluxo<br/><span>Produtivo</span></h1>
    </div>
    <div class="form-group">
      <label>Operador</label>
      <input id="login-operador" type="text" placeholder="Digite seu nome"
        onkeydown="if(event.key==='Enter') document.getElementById('login-pin').focus()"/>
    </div>
    <div class="form-group">
      <label>PIN</label>
      <div class="pin-wrap">
        <input id="login-pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••"
          onkeydown="if(event.key==='Enter') fazerLogin()"/>
        <button class="pin-toggle" onclick="togglePin()">👁</button>
      </div>
    </div>
    <button class="btn-primary" onclick="fazerLogin()">ENTRAR</button>
    <div id="login-erro" class="msg-erro"></div>
  </div>
</div>

<!-- ═══════════ MAIN (SETOR) ═══════════ -->
<div id="tela-main" class="tela">
  <header class="app-header">
    <div class="header-info">
      <span id="header-nome" class="header-nome"></span>
      <span id="header-setor" class="setor-badge"></span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="irPara('tela-status')" title="Ver Fluxo">📋</button>
      <button class="btn-icon" onclick="fazerLogout()" title="Sair">🚪</button>
    </div>
  </header>

  <div id="camera-container" class="camera-container hidden">
    <video id="camera-video" autoplay playsinline></video>
    <div class="camera-overlay"><div class="camera-frame"></div></div>
    <button class="btn-fechar-camera" onclick="fecharCamera()">✕ Fechar câmera</button>
  </div>

  <!-- SEÇÃO SETOR NORMAL -->
  <div id="secao-setor" class="secao hidden">
    <div class="ops-header">
      <span class="ops-titulo">OPs em <strong id="setor-recebeDE"></strong></span>
      <button class="btn-refresh-sm" onclick="carregarOPsDisponiveis()">↺</button>
    </div>
    <input id="busca-setor" type="text" class="busca-campo"
      placeholder="Buscar por OP, código ou descrição..."
      oninput="filtrarOPs(this.value)"
      onchange="tentarQR(this.value)"/>
    <div id="ops-lista" class="ops-lista"></div>
    <div class="acoes-row">
      <button id="btn-receber" class="btn-receber" onclick="receberOP()" disabled>✅ RECEBER</button>
      <button id="btn-rejeitar" class="btn-rejeitar hidden" onclick="abrirModalRejeitar()" disabled>↩️ REJEITAR</button>
    </div>
  </div>

  <!-- SEÇÃO PCP ADMIN -->
  <div id="secao-pcp" class="secao hidden">
    <!-- Tabs -->
    <div class="pcp-tabs">
      <button class="pcp-tab ativo" onclick="pcpTab('fluxo')">📋 Fluxo Geral</button>
      <button class="pcp-tab" onclick="pcpTab('mover')">🔀 Mover OP</button>
      <button class="pcp-tab" onclick="pcpTab('editar')">✏️ Editar OP</button>
    </div>

    <!-- TAB: Fluxo Geral -->
    <div id="pcp-tab-fluxo" class="pcp-tab-content">
      <div class="ops-header">
        <span class="ops-titulo">Todas as OPs em aberto</span>
        <div style="display:flex;gap:6px">
          <button class="btn-refresh-sm" onclick="sincronizarStatus()">🔄 Sync</button>
          <button class="btn-refresh-sm" onclick="carregarStatusAdmin()">↺</button>
        </div>
      </div>
      <div class="busca-wrap" style="margin-bottom:8px">
        <input id="pcp-busca" type="text" placeholder="Buscar OP, código, setor..." oninput="filtrarStatusAdmin()"/>
      </div>
      <div id="pcp-status-lista" class="status-lista"></div>
    </div>

    <!-- TAB: Mover OP -->
    <div id="pcp-tab-mover" class="pcp-tab-content hidden">
      <div class="campo-grupo">
        <label>OP</label>
        <input id="mover-op" type="text" placeholder="Número da OP"/>
      </div>
      <div class="campo-grupo">
        <label>Nova Custódia</label>
        <select id="mover-custodia">
          <option value="">Selecione o setor</option>
          <option>ESTOQUE</option>
          <option>PRODUÇÃO</option>
          <option>QUALIDADE</option>
          <option>CONSOLIDAÇÃO</option>
          <option>EXPEDIDO</option>
          <option>PA</option>
          <option>RESERVA</option>
        </select>
      </div>
      <div class="campo-grupo">
        <label>Motivo *</label>
        <input id="mover-motivo" type="text" placeholder="Motivo do ajuste"/>
      </div>
      <button class="btn-primary" onclick="moverOP()">🔀 MOVER OP</button>
    </div>

    <!-- TAB: Editar OP -->
    <div id="pcp-tab-editar" class="pcp-tab-content hidden">
      <div class="campo-grupo">
        <label>OP</label>
        <input id="editar-op" type="text" placeholder="Número da OP"/>
      </div>
      <div class="campo-grupo">
        <label>Nova Qtde</label>
        <input id="editar-qtde" type="number" placeholder="Quantidade"/>
      </div>
      <div class="campo-grupo">
        <label>Nova Descrição</label>
        <input id="editar-desc" type="text" placeholder="Descrição do produto"/>
      </div>
      <button class="btn-primary" onclick="editarOP()">✏️ SALVAR ALTERAÇÕES</button>
    </div>
  </div>
</div>

<!-- ═══════════ STATUS ═══════════ -->
<div id="tela-status" class="tela">
  <header class="app-header">
    <button class="btn-back" onclick="irPara('tela-main')">← Voltar</button>
    <span class="header-title">Fluxo de Processo</span>
    <button class="btn-icon" onclick="carregarStatus()">↺</button>
  </header>
  <div class="status-body">
    <div class="busca-wrap">
      <input id="busca-op" type="text" placeholder="Buscar OP, código, setor..." oninput="filtrarStatus()"/>
    </div>
    <div id="status-lista" class="status-lista"></div>
  </div>
</div>

<!-- ═══════════ MODAL REJEITAR ═══════════ -->
<div id="modal-rejeitar" class="modal-overlay hidden" onclick="fecharModalRejeitar()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-titulo">↩️ Rejeitar OP</div>
    <div class="campo-grupo">
      <label>Enviar para</label>
      <select id="rejeitar-destino"></select>
    </div>
    <div class="campo-grupo">
      <label>Motivo *</label>
      <input id="rejeitar-motivo" type="text" placeholder="Descreva o motivo..."/>
    </div>
    <div class="modal-btns">
      <button class="btn-outline" onclick="fecharModalRejeitar()">Cancelar</button>
      <button class="btn-rejeitar-confirm" onclick="confirmarRejeicao()">Confirmar</button>
    </div>
  </div>
</div>

<!-- ═══════════ MODAL HISTÓRICO ═══════════ -->
<div id="modal-historico" class="modal-overlay hidden" onclick="fecharModalHistorico()">
  <div class="modal-box modal-hist-box" onclick="event.stopPropagation()">
    <div class="modal-hist-header">
      <div class="modal-titulo" id="modal-hist-op"></div>
      <div id="modal-hist-produto" class="modal-hist-produto"></div>
    </div>
    <!-- Foto do produto no histórico -->
    <div id="modal-hist-foto-wrap" class="modal-hist-foto-wrap hidden">
      <img id="modal-hist-foto" src="" alt="Produto" class="modal-hist-foto"/>
    </div>
    <div id="modal-hist-body" class="hist-body"></div>
    <button class="btn-primary" onclick="fecharModalHistorico()">Fechar</button>
  </div>
</div>

<!-- ═══════════ MODAL GENÉRICO ═══════════ -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="fecharModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="modal-icon" class="modal-icon"></div>
    <div id="modal-msg" class="modal-msg"></div>
    <button class="btn-primary" onclick="fecharModal()">OK</button>
  </div>
</div>

<!-- Loading -->
<div id="loading" class="loading-overlay hidden">
  <div class="loading-spinner"></div>
</div>

<script src="app.js"></script>
</body>
</html>
