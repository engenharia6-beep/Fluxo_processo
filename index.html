<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Fluxo Produtivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="app.css"/>
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="tela-login" class="tela ativa">
  <div class="login-bg"><div class="login-grid"></div></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">⚙</div>
      <h1>Fluxo<br/><span>Produtivo</span></h1>
    </div>
    <div class="form-group">
      <label>Operador</label>
      <select id="login-operador"><option value="">Carregando...</option></select>
    </div>
    <div class="form-group">
      <label>PIN</label>
      <div class="pin-wrap">
        <input id="login-pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••"/>
        <button class="pin-toggle" onclick="togglePin()">👁</button>
      </div>
    </div>
    <button class="btn-primary" onclick="fazerLogin()">ENTRAR</button>
    <div id="login-erro" class="msg-erro"></div>
  </div>
</div>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<div id="tela-main" class="tela">
  <header class="app-header">
    <div class="header-info">
      <span id="header-nome" class="header-nome"></span>
      <span id="header-setor" class="setor-badge"></span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="irPara('tela-status')" title="Ver Fluxo">📋</button>
      <button class="btn-icon" onclick="fazerLogout()" title="Sair">🚪</button>
    </div>
  </header>

  <!-- ── CÂMERA (compartilhada) ── -->
  <div id="camera-container" class="camera-container hidden">
    <video id="camera-video" autoplay playsinline></video>
    <div class="camera-overlay"><div class="camera-frame"></div></div>
    <button class="btn-fechar-camera" onclick="fecharCamera()">✕ Fechar câmera</button>
  </div>

  <!-- ══════ SEÇÃO PCP ══════ -->
  <div id="secao-pcp" class="secao hidden">
    <div class="secao-titulo">🚀 Lançar OP para Estoque</div>

    <div class="campo-grupo">
      <label>QR Code</label>
      <div class="qr-row">
        <input id="pcp-qr" type="text" placeholder="Bipe ou use a câmera"
          onchange="processarQRPCP(this.value)"/>
        <button class="btn-camera" onclick="abrirCamera()">📷</button>
      </div>
    </div>

    <div class="campo-grid">
      <div class="campo-grupo">
        <label>OP *</label>
        <input id="pcp-op" type="text" placeholder="Ex: 3762"/>
      </div>
      <div class="campo-grupo">
        <label>Qtde</label>
        <input id="pcp-qtde" type="number" placeholder="0"/>
      </div>
    </div>

    <div class="campo-grupo">
      <label>Código</label>
      <input id="pcp-cod" type="text" placeholder="Código do produto"/>
    </div>

    <div class="campo-grupo">
      <label>Descrição</label>
      <div id="pcp-descricao" class="campo-readonly">—</div>
    </div>

    <div class="campo-grupo">
      <label>OBS</label>
      <input id="pcp-obs" type="text" placeholder="Observação (opcional)"/>
    </div>

    <button class="btn-primary btn-lancar" onclick="lancarOP()">
      🚀 LANÇAR PARA ESTOQUE
    </button>
  </div>

  <!-- ══════ SEÇÃO SETOR ══════ -->
  <div id="secao-setor" class="secao hidden">

    <!-- QR / busca -->
    <div class="campo-grupo">
      <label>QR Code <span class="label-hint">(ou selecione abaixo)</span></label>
      <div class="qr-row">
        <input id="setor-qr" type="text" placeholder="Bipe para selecionar a OP"
          onchange="processarQR(this.value)"/>
        <button class="btn-camera" onclick="abrirCamera()">📷</button>
      </div>
    </div>

    <!-- Lista de OPs disponíveis -->
    <div class="ops-header">
      <span class="ops-titulo">OPs em <strong id="setor-recebeDE"></strong></span>
      <button class="btn-refresh-sm" onclick="carregarOPsDisponiveis()">↺ Atualizar</button>
    </div>
    <div id="ops-lista" class="ops-lista"></div>

    <!-- OP selecionada preview -->
    <div id="op-preview" class="op-preview hidden"></div>

    <!-- Ações -->
    <div class="acoes-row">
      <button id="btn-receber" class="btn-receber" onclick="receberOP()" disabled>
        ✅ RECEBER
      </button>
      <button id="btn-rejeitar" class="btn-rejeitar hidden" onclick="abrirModalRejeitar()" disabled>
        ↩️ REJEITAR
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════ STATUS ═══════════════════ -->
<div id="tela-status" class="tela">
  <header class="app-header">
    <button class="btn-back" onclick="irPara('tela-main')">← Voltar</button>
    <span class="header-title">Fluxo de Processo</span>
    <button class="btn-icon" onclick="carregarStatus()">↺</button>
  </header>
  <div class="status-body">
    <div class="busca-wrap">
      <input id="busca-op" type="text" placeholder="Buscar OP, código, setor..." oninput="filtrarStatus()"/>
    </div>
    <div id="status-lista" class="status-lista"></div>
  </div>
</div>

<!-- ═══════════════════ MODAL REJEITAR ═══════════════════ -->
<div id="modal-rejeitar" class="modal-overlay hidden" onclick="fecharModalRejeitar()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-titulo">↩️ Rejeitar OP</div>
    <div class="campo-grupo">
      <label>Enviar para</label>
      <select id="rejeitar-destino"></select>
    </div>
    <div class="campo-grupo">
      <label>Motivo *</label>
      <input id="rejeitar-motivo" type="text" placeholder="Descreva o motivo..."/>
    </div>
    <div class="modal-btns">
      <button class="btn-outline" onclick="fecharModalRejeitar()">Cancelar</button>
      <button class="btn-rejeitar-confirm" onclick="confirmarRejeicao()">Confirmar Rejeição</button>
    </div>
  </div>
</div>

<!-- ═══════════════════ MODAL HISTÓRICO ═══════════════════ -->
<div id="modal-historico" class="modal-overlay hidden" onclick="fecharModalHistorico()">
  <div class="modal-box modal-hist-box" onclick="event.stopPropagation()">
    <div class="modal-titulo" id="modal-hist-op"></div>
    <div id="modal-hist-body" class="hist-body"></div>
    <button class="btn-primary" onclick="fecharModalHistorico()">Fechar</button>
  </div>
</div>

<!-- ═══════════════════ MODAL GENÉRICO ═══════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="fecharModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="modal-icon" class="modal-icon"></div>
    <div id="modal-msg"  class="modal-msg"></div>
    <button class="btn-primary" onclick="fecharModal()">OK</button>
  </div>
</div>

<!-- Loading -->
<div id="loading" class="loading-overlay hidden">
  <div class="loading-spinner"></div>
</div>

<script src="app.js"></script>
</body>
</html>
