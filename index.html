<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A6E6E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SIF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SIF – Fluxo Produtivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #EDF6F4;
    --surface:   #ffffff;
    --surface2:  #F4FAFA;
    --border:    rgba(10,110,110,0.15);
    --accent:    #0A6E6E;
    --accent2:   #E07020;
    --danger:    #cc3322;
    --success:   #1a7a4a;
    --warning:   #b86e00;
    --text:      #1A4040;
    --text2:     #5A8A8A;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --login-bg1:     #D6ECEC;
    --login-bg2:     #EDF6F0;
    --login-card:    #ffffff;
    --login-teal:    #0A6E6E;
    --login-teal-dk: #084F4F;
    --login-orange:  #E07020;
    --login-input:   #F4FAFA;
    --login-border:  rgba(10,110,110,0.18);
    --login-text:    #1A4040;
    --login-muted:   #5A8A8A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TELA ── */
  .tela { display: none; min-height: 100vh; flex-direction: column; }
  .tela.ativa { display: flex; }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #0A6E6E;
    border-bottom: none;
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header-user {
    display: flex; align-items: center; gap: 10px;
  }
  .header-setor {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    background: #E07020;
    color: #ffffff;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .btn-sair {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.6);
    padding: 5px 11px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: var(--mono);
  }
  .btn-sair:hover { border-color: rgba(255,255,255,0.7); color: #fff; }

  /* ── LOGIN ── */
  #tela-login {
    background: linear-gradient(145deg, var(--login-bg1) 0%, var(--login-bg2) 100%);
    justify-content: center;
    align-items: center;
    padding: 24px;
  }
  .login-box {
    width: 100%;
    max-width: 360px;
    background: var(--login-card);
    border: 0.5px solid var(--login-border);
    border-radius: 20px;
    padding: 36px 28px 28px;
    box-shadow: 0 6px 32px rgba(10,110,110,0.10);
  }
  .login-logo-wrap {
    text-align: center;
    margin-bottom: 18px;
  }
  .login-logo-bg {
    display: inline-block;
    background: #ffffff;
    border-radius: 10px;
    padding: 8px 22px;
    line-height: 0;
  }
  .login-logo-bg img {
    height: 48px;
    width: auto;
    display: block;
  }
  .login-accent-bar {
    width: 32px;
    height: 3px;
    background: var(--login-orange);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .login-titulo {
    text-align: center;
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--login-teal);
    letter-spacing: .1em;
    margin-bottom: 4px;
  }
  .login-sub {
    text-align: center;
    font-size: 12px;
    color: var(--login-muted);
    line-height: 1.6;
    margin-bottom: 26px;
  }
  .login-sub strong {
    color: var(--login-teal);
    font-weight: 500;
  }

  .campo-grupo { margin-bottom: 16px; }
  .campo-label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--login-teal);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .campo-input {
    width: 100%;
    background: var(--login-input);
    border: 1px solid var(--login-border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    color: var(--login-text);
    font-family: var(--sans);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .campo-input:focus {
    border-color: var(--login-teal);
    box-shadow: 0 0 0 3px rgba(10,110,110,0.10);
  }
  .campo-input::placeholder { color: var(--login-muted); opacity: 0.7; }

  /* Select customizado */
  .select-lista {
    width: 100%;
    background: var(--login-input);
    border: 1px solid var(--login-border);
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
  }
  .select-item {
    padding: 12px 14px;
    cursor: pointer;
    font-size: 15px;
    color: var(--login-text);
    border-bottom: 1px solid var(--login-border);
    transition: background .15s;
  }
  .select-item:last-child { border-bottom: none; }
  .select-item:hover, .select-item.selecionado {
    background: rgba(10,110,110,0.08);
    color: var(--login-teal);
  }

  .btn-primario {
    width: 100%;
    background: var(--login-teal);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 6px;
    transition: background .2s, opacity .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primario::after {
    content: "";
    width: 8px; height: 8px;
    background: var(--login-orange);
    border-radius: 50%;
    display: inline-block;
  }
  .btn-primario:hover { background: var(--login-teal-dk); }
  .btn-primario:disabled { opacity: .4; cursor: not-allowed; }
  .login-footer {
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
    color: var(--login-muted);
    font-family: var(--mono);
  }
  .btn-instalar {
    display: none;
    width: 100%;
    background: none;
    border: 1px solid var(--login-border);
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--login-teal);
    font-family: var(--sans);
    cursor: pointer;
    margin-top: 10px;
    transition: background .2s, border-color .2s;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-instalar.visivel { display: flex; }
  .btn-instalar:hover { background: rgba(10,110,110,0.06); border-color: var(--login-teal); }
  .install-icon { font-size: 16px; }

  /* ── TELA PRINCIPAL ── */
  #tela-principal { background: #EDF6F4; }

  .toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: #ffffff;
    border-bottom: 0.5px solid rgba(10,110,110,0.12);
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar-filtro {
    flex: 1;
    min-width: 140px;
    background: #F4FAFA;
    border: 1px solid rgba(10,110,110,0.18);
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--sans);
    outline: none;
  }
  .toolbar-filtro:focus { border-color: #0A6E6E; box-shadow: 0 0 0 3px rgba(10,110,110,0.08); }
  .toolbar-filtro::placeholder { color: var(--text2); }
  .toolbar-btn {
    background: #F4FAFA;
    border: 1px solid rgba(10,110,110,0.18);
    color: #0A6E6E;
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }
  .toolbar-btn:hover { background: #E0F4F4; border-color: #0A6E6E; }
  .toolbar-btn.ativo { background: #0A6E6E; color: #fff; border-color: #0A6E6E; font-weight: 700; }

  .contador {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    padding: 8px 16px;
    background: #EDF6F4;
    border-bottom: 0.5px solid rgba(10,110,110,0.08);
    white-space: nowrap;
    width: 100%;
  }
  .contador span { color: #0A6E6E; font-weight: 700; }

  /* ── LISTA DE OPs ── */
  .ops-lista {
    flex: 1;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .op-card {
    background: #ffffff;
    border: 0.5px solid rgba(10,110,110,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .2s, box-shadow .15s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .op-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: #0A6E6E;
    border-radius: 3px 0 0 3px;
  }
  .op-card:hover { border-color: #0A6E6E; transform: translateX(2px); box-shadow: 0 2px 8px rgba(10,110,110,0.08); }
  .op-card.selecionado { border-color: #0A6E6E; background: #F0FAFA; }
  .op-card.selecionado::before { width: 4px; background: #E07020; }

  .op-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .op-numero {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: #0A6E6E;
    letter-spacing: 1px;
  }
  .op-pedido {
    font-family: var(--mono);
    font-size: 11px;
    color: #5A8A8A;
    background: #EDF6F4;
    padding: 3px 8px;
    border-radius: 4px;
    border: 0.5px solid rgba(10,110,110,0.15);
  }
  .op-codigo {
    font-family: var(--mono);
    font-size: 13px;
    color: #E07020;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .op-desc {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .op-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .op-qtde {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .op-qtde span { color: var(--text2); font-size: 11px; }
  .op-body {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .op-foto {
    width: 64px;
    height: 64px;
    object-fit: contain;
    border-radius: 8px;
    background: #EDF6F4;
    border: 0.5px solid rgba(10,110,110,0.12);
    flex-shrink: 0;
  }
  .op-info { flex: 1; min-width: 0; }
  .op-desc { margin-bottom: 0; }

  .op-setor-atual {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: #EDF6F4;
    color: #5A8A8A;
    border: 0.5px solid rgba(10,110,110,0.12);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-txt { font-family: var(--mono); font-size: 13px; letter-spacing: 1px; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: sticky;
    bottom: 0;
    background: #ffffff;
    border-top: 0.5px solid rgba(10,110,110,0.12);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
  }
  .btn-receber {
    flex: 2;
    background: #0A6E6E;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, opacity .2s;
  }
  .btn-receber:disabled { opacity: .3; cursor: not-allowed; }
  .btn-receber:not(:disabled):hover { background: #084F4F; }

  .btn-rejeitar {
    flex: 1;
    background: none;
    color: #cc3322;
    border: 1px solid #cc3322;
    border-radius: 10px;
    padding: 15px;
    font-size: 12px;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-rejeitar:disabled { opacity: .3; cursor: not-allowed; }
  .btn-rejeitar:not(:disabled):hover { background: #cc3322; color: #fff; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    justify-content: center;
    align-items: flex-end;
  }
  .modal-overlay.ativo { display: flex; }
  .modal {
    background: #ffffff;
    border: 0.5px solid rgba(10,110,110,0.15);
    border-radius: 16px 16px 0 0;
    padding: 28px 24px 32px;
    width: 100%;
    max-width: 520px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-titulo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: #5A8A8A;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .modal-op {
    font-size: 22px;
    font-weight: 700;
    color: #1A4040;
    margin-bottom: 20px;
  }
  .modal-op span { color: #0A6E6E; font-family: var(--mono); }
  .modal-info {
    background: #F4FAFA;
    border-radius: 10px;
    border: 0.5px solid rgba(10,110,110,0.12);
    padding: 14px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-info-item label {
    font-family: var(--mono);
    font-size: 10px;
    color: #5A8A8A;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 3px;
    text-transform: uppercase;
  }
  .modal-info-item span {
    font-size: 14px;
    font-weight: 600;
    color: #1A4040;
  }
  .modal-obs {
    width: 100%;
    background: #F4FAFA;
    border: 1px solid rgba(10,110,110,0.18);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: #1A4040;
    font-family: var(--sans);
    resize: none;
    outline: none;
    margin-bottom: 20px;
    min-height: 70px;
  }
  .modal-obs:focus { border-color: #0A6E6E; box-shadow: 0 0 0 3px rgba(10,110,110,0.08); }
  .modal-obs::placeholder { color: #5A8A8A; }

  .modal-btns { display: flex; gap: 10px; }
  .modal-btns .btn-receber { font-size: 14px; padding: 14px; }
  .btn-cancelar {
    background: none;
    border: 1px solid rgba(10,110,110,0.2);
    color: #5A8A8A;
    border-radius: 10px;
    padding: 14px 20px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color .2s;
  }
  .btn-cancelar:hover { border-color: #0A6E6E; color: #0A6E6E; }

  /* Rejeitar — opções de destino */
  .rejeitar-opcoes {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }
  .rejeitar-op-btn {
    background: #F4FAFA;
    border: 1px solid rgba(10,110,110,0.15);
    border-radius: 10px;
    padding: 14px;
    color: #1A4040;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all .2s;
  }
  .rejeitar-op-btn:hover, .rejeitar-op-btn.selecionado {
    border-color: #cc3322;
    color: #cc3322;
    background: #fff5f5;
  }

  /* ── LOADING ── */
  .loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(237,246,244,.88);
    z-index: 300;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
  }
  .loading.ativo { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(10,110,110,0.15);
    border-top-color: #0A6E6E;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt {
    font-family: var(--mono);
    font-size: 12px;
    color: #0A6E6E;
    letter-spacing: 2px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #ffffff;
    border: 0.5px solid rgba(10,110,110,0.2);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: #1A4040;
    opacity: 0;
    transition: all .3s;
    z-index: 400;
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(10,110,110,0.12);
  }
  .toast.sucesso { border-color: #1a7a4a; color: #1a7a4a; }
  .toast.erro { border-color: #cc3322; color: #cc3322; }
  .toast.visivel { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #EDF6F4; }
  ::-webkit-scrollbar-thumb { background: rgba(10,110,110,0.2); border-radius: 2px; }

  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 12px; margin: 20px; }
    .ops-lista { padding: 20px; gap: 12px; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">CARREGANDO...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════ -->
<!-- TELA LOGIN -->
<!-- ═══════════════════════════════════════ -->
<div class="tela ativa" id="tela-login">
  <div class="login-box">
    <div class="login-logo-wrap">
      <div class="login-logo-bg">
        <img src="Futura.png" alt="Futura Outsourcing" onerror="this.style.display='none'">
      </div>
    </div>
    <div class="login-accent-bar"></div>
    <div class="login-titulo">SIF</div>
    <div class="login-sub">
      Sistema de Produção Futura<br>
      <strong>Fluxo Produtivo</strong>
    </div>

    <div class="campo-grupo">
      <label class="campo-label" for="campo-nome">Nome</label>
      <input class="campo-input" type="text" id="campo-nome" placeholder="Seu nome" autocomplete="off">
    </div>

    <div class="campo-grupo">
      <label class="campo-label" for="campo-pin">PIN</label>
      <input class="campo-input" type="password" id="campo-pin" placeholder="••••" maxlength="6" inputmode="numeric">
    </div>

    <button class="btn-primario" id="btn-login" disabled>ENTRAR</button>
    <div id="login-erro" style="color:#cc2200;font-size:13px;text-align:center;margin-top:12px;font-family:var(--mono);display:none"></div>
    <button class="btn-instalar" id="btn-instalar">
      <span class="install-icon">⬇</span> Instalar app
    </button>
    <div class="login-footer">Futura Outsourcing © 2026</div>
  </div>
</div>

<!-- ═══════════════════════════════════════ -->
<!-- TELA PRINCIPAL -->
<!-- ═══════════════════════════════════════ -->
<div class="tela" id="tela-principal">
  <div class="header">
    <div class="header-logo">FLUXO</div>
    <div class="header-user">
      <div class="header-setor" id="hd-setor">—</div>
      <div style="font-size:13px;color:var(--text2)" id="hd-nome">—</div>

<script src="app.js"></script>
<script>
  // ── PWA: Service Worker ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW erro:', err));
    });
  }

  // ── PWA: Prompt de instalação ──
  let deferredPrompt = null;
  const btnInstalar = document.getElementById('btn-instalar');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    btnInstalar.classList.add('visivel');
  });

  btnInstalar.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if (outcome === 'accepted') btnInstalar.classList.remove('visivel');
  });

  // Ocultar botão se já instalado
  window.addEventListener('appinstalled', () => {
    btnInstalar.classList.remove('visivel');
    deferredPrompt = null;
  });

  // iOS: mostrar instrução diferente (não tem beforeinstallprompt)
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone) {
    btnInstalar.textContent = '⬆ Adicionar à tela inicial';
    btnInstalar.classList.add('visivel');
    btnInstalar.addEventListener('click', () => {
      alert('No Safari: toque em Compartilhar (□↑) e depois "Adicionar à Tela de Início".');
    }, { once: true });
  }
</script>
